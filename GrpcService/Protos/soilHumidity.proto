syntax = "proto3";

option csharp_namespace = "GrpcService";
package soilHumidity;
import "google/protobuf/empty.proto";

//messages
message CreateSoilHumidityRequest{
  string plantMAC = 1;
  double value = 2;
}

//Services
service SoilHumidityServiceProto {
  rpc Create(CreateSoilHumidityRequest) returns (google.protobuf.Empty);
}