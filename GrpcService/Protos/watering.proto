syntax = "proto3";

option csharp_namespace = "GrpcService";
package watering;
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message WateringResponse{
  string plantMAC = 1;
  int32 Id = 2;
  google.protobuf.Timestamp LastWaterTime = 3;
  google.protobuf.Timestamp PredictedFutureWaterTime = 4;
  int32 PumpTimeInSeconds = 5;
  double WaterLevel = 6;
}
message CreateWateringRequest{
  string plantMAC = 1;
  google.protobuf.Timestamp LastWaterTime = 2;
  google.protobuf.Timestamp PredictedFutureWaterTime = 3;
  int32 PumpTimeInSeconds = 4;
  double WaterLevel = 5;
}
message GetLatestWateringDataRequest{
  string plantMAC = 1;
}
message PreviousWateringResponses{
  repeated WateringResponse Readings = 1;
}
service WateringServiceProto {
  rpc Create(CreateWateringRequest) returns (google.protobuf.Empty);
  rpc GetLatest(GetLatestWateringDataRequest) returns (WateringResponse);
}