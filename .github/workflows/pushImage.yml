name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./GrpcService/Dockerfile
          push: true
          tags: |
            ghcr.io/via-plantify/plantify-datatier/grpcserver:latest
            ghcr.io/via-plantify/plantify-datatier/grpcserver:${{ steps.sha.outputs.short }}
